defaults:
  - env/libero_90@env.train
  - env/libero_90@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-7
    rollout: 0-7
    env: 0-7
  resource_pool:
    enabled: true
    allocation_mode: default
    cpu:
      enabled: true
      pools:
        env_cpu:
          node_group: cluster
          cores: ${oc.env:RLINF_ENV_CPU_CORES,0-111}
      components:
        env:
          pool: env_cpu
          granularity: per_env
    gpu:
      enabled: true
      mode: mps
      pools:
        env_render_gpu:
          node_group: cluster
          devices: ${oc.env:RLINF_ENV_RENDER_GPUS,0-7}
      components:
        env:
          pool: env_render_gpu
          sm_percent: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_90_ppo_openpi_pi05_pairing_pipeline2_profile"
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 40

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 4

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 224
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 510

    chunk_step_mode: latency_balanced_pair
    log_sim_timestamps: True
    log_sim_affinity_interval: 1
    latency_balanced_pair:
      envs_per_core: 1
      ema_alpha: 0.3
      initial_latency_ms: null
      dynamic_affinity: True
      core_donation_enabled: True
      core_donation_max_extra_groups: 1

  eval:
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_90
  enable_offload: True
  pipeline_stage_num: 2

  model:
    model_path: "/data1/gaobowen/model/RLinf-Pi05-LIBERO-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 1024
  seed: 42
  enable_offload: True

  model:
    model_path: "/data1/gaobowen/model/RLinf-Pi05-LIBERO-SFT"
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: 5
    openpi:
      noise_level: 0.3
      value_after_vlm: True

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
