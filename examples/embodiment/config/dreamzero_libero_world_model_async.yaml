# DreamZero world-model proxy RL on LIBERO Spatial.
# Async 8-GPU baseline: actor uses one GPU group, env and rollout share another.
# Example:
#   cd examples/embodiment
#   python train_embodied_agent.py --config-name dreamzero_libero_world_model_async

defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/dreamzero_5b@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-3
    env,rollout: 4-7

runner:
  task_type: embodied
  logger:
    log_path: ${oc.env:RLINF_DREAMZERO_LOG_DIR,/tmp/rlinf-dreamzero-libero-async}
    project_name: rlinf
    experiment_name: dreamzero_libero_world_model_async
    logger_backends: ["tensorboard"]
  max_epochs: 1000
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 1
  staleness_threshold: 2
  behave_weight_threshold: 5
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  adv_type: dreamzero
  loss_type: dreamzero_world_model_proxy
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: false
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: false
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: EnvGroup
  train:
    task_suite_name: libero_spatial
    total_num_envs: 128
    group_size: ${algorithm.group_size}
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    auto_reset: false
    ignore_terminations: false
    video_cfg:
      save_video: true
      info_on_video: false
      video_base_dir: ${runner.logger.log_path}/video/train
    init_params:
      camera_heights: 256
      camera_widths: 256
  eval:
    task_suite_name: libero_spatial
    total_num_envs: 64
    group_size: 1
    auto_reset: true
    ignore_terminations: true
    is_eval: true
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    video_cfg:
      save_video: true
      info_on_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      camera_heights: 256
      camera_widths: 256

rollout:
  group_name: RolloutGroup
  generation_backend: huggingface
  collect_transitions: true
  recompute_logprobs: false
  enable_offload: false
  pipeline_stage_num: 1
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 1
  global_batch_size: 64
  seed: 42
  enable_offload: false
  model:
    model_type: dreamzero
    model_path: ${oc.env:DREAMZERO_MODEL_PATH,/path/to/model/dreamzero}
    tokenizer_path: ${oc.env:DREAMZERO_TOKENIZER_PATH,google/umt5-xxl}
    diffusion_model_pretrained_path: ${oc.env:DREAMZERO_WAN_PATH,Wan-AI/Wan2.1-I2V-14B-480P}
    image_encoder_pretrained_path: ${oc.env:DREAMZERO_IMAGE_ENCODER_PATH,${actor.model.diffusion_model_pretrained_path}/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth}
    text_encoder_pretrained_path: ${oc.env:DREAMZERO_TEXT_ENCODER_PATH,${actor.model.diffusion_model_pretrained_path}/models_t5_umt5-xxl-enc-bf16.pth}
    vae_pretrained_path: ${oc.env:DREAMZERO_VAE_PATH,${actor.model.diffusion_model_pretrained_path}/Wan2.1_VAE.pth}
    metadata_json_path: ${oc.env:DREAMZERO_METADATA_JSON_PATH,${actor.model.model_path}/experiment_cfg/metadata.json}
    action_dim: 32
    env_action_dim: 7
    action_horizon: 16
    num_action_per_block: 16
    max_action_dim: 32
    max_state_dim: 64
    num_action_chunks: 16
    target_video_height: 160
    target_video_width: 320
    embodiment_tag: libero_sim
    precision: bf16
    add_value_head: false
    add_q_head: false
    is_lora: false
    gradient_checkpointing: true
  optim:
    lr: 1.0e-5
    value_lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: fsdp
    sharding_strategy: full_shard
    use_orig_params: true
    gradient_checkpointing: true
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
