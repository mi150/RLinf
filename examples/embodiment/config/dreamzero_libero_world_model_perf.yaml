# DreamZero world-model proxy RL performance test on LIBERO Spatial.
#
# Local machine assumptions for this benchmark:
# - 8 visible GPUs.
# - Actor, env, and rollout share GPUs 0-7 through MPS resource pools.
# - Actor and rollout both request 100% SM; env keeps GPU SM at 0.
# - CPU pool uses cores 0-63 for 128 LIBERO env workers with pipeline=2.
# - rollout.pipeline_stage_num=2 is kept for pipeline overlap.

defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/dreamzero_5b@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH,/data1/tianze/RLinf-tianze/examples/embodiment}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7
  resource_pool:
    enabled: true
    allocation_mode: default
    cpu:
      enabled: true
      pools:
        env_cpu:
          node_group: cluster
          cores: 0-63
      components:
        env:
          pool: env_cpu
          granularity: per_env
    gpu:
      enabled: true
      mode: mps
      pools:
        gpu_pool:
          node_group: cluster
          devices: 0-7
      components:
        actor:
          pool: gpu_pool
          sm_percent: 100
        rollout:
          pool: gpu_pool
          sm_percent: 20
        env:
          pool: gpu_pool
          sm_percent: 0

runner:
  task_type: embodied
  logger:
    log_path: /data1/tianze/logs/dreamzero_libero_world_model_perf
    project_name: rlinf
    experiment_name: dreamzero_libero_world_model_perf
    logger_backends: ["tensorboard"]
  max_epochs: 1000
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 1
  staleness_threshold: 2
  behave_weight_threshold: 5
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  adv_type: dreamzero
  loss_type: dreamzero_action_head_rl
  dreamzero_logprob_mode: action_chain
  dreamzero_action_logprob_std: 0.02
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: false
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: false
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: EnvGroup
  train:
    task_suite_name: libero_spatial
    total_num_envs: 128
    group_size: ${algorithm.group_size}
    max_episode_steps: 256
    max_steps_per_rollout_epoch: 256
    auto_reset: false
    ignore_terminations: false
    use_ordered_reset_state_ids: false
    video_cfg:
      save_video: false
      info_on_video: false
      video_base_dir: ${runner.logger.log_path}/video/train
    init_params:
      camera_heights: 256
      camera_widths: 256
    chunk_step_mode: latency_balanced_pair
    log_sim_timestamps: true
    log_sim_affinity_interval: 1
    latency_balanced_pair:
      # Current RLinf validation requires envs_per_core=1 for
      # latency_balanced_pair core donation v2.
      envs_per_core: 1
      ema_alpha: 0.3
      initial_latency_ms: null
      dynamic_affinity: true
      core_donation_enabled: true
      core_donation_max_extra_groups: 1
    chunk_step_num_shards: 1
  eval:
    task_suite_name: libero_spatial
    total_num_envs: 64
    group_size: 1
    auto_reset: true
    ignore_terminations: true
    is_eval: true
    max_episode_steps: 256
    max_steps_per_rollout_epoch: 256
    video_cfg:
      save_video: true
      info_on_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      camera_heights: 256
      camera_widths: 256

rollout:
  group_name: RolloutGroup
  generation_backend: huggingface
  collect_transitions: true
  recompute_logprobs: false
  enable_offload: false
  pipeline_stage_num: 2
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 2
  global_batch_size: 64
  seed: 42
  enable_offload: false
  model:
    model_type: dreamzero
    model_path: /data2/tianze/checkpoints/RLinf-DreamZero-WAN2.2-5B-LIBERO-SFT-Step18000
    tokenizer_path: /data2/tianze/checkpoints/Wan2.1-I2V-14B-480P/google/umt5-xxl
    diffusion_model_pretrained_path: /data2/tianze/checkpoints/Wan2.1-I2V-14B-480P
    image_encoder_pretrained_path: /data2/tianze/checkpoints/Wan2.1-I2V-14B-480P/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth
    text_encoder_pretrained_path: /data2/tianze/checkpoints/Wan2.1-I2V-14B-480P/models_t5_umt5-xxl-enc-bf16.pth
    vae_pretrained_path: /data2/tianze/checkpoints/Wan2.1-I2V-14B-480P/Wan2.1_VAE.pth
    metadata_json_path: /data2/tianze/checkpoints/RLinf-DreamZero-WAN2.2-5B-LIBERO-SFT-Step18000/experiment_cfg/metadata.json
    action_dim: 32
    env_action_dim: 7
    action_horizon: 16
    num_action_per_block: 16
    max_action_dim: 32
    max_state_dim: 64
    num_action_chunks: 16
    target_video_height: 160
    target_video_width: 320
    embodiment_tag: libero_sim
    precision: bf16
    add_value_head: false
    add_q_head: false
    is_lora: false
    gradient_checkpointing: true
  optim:
    lr: 1.0e-5
    value_lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: fsdp
    sharding_strategy: full_shard
    use_orig_params: true
    gradient_checkpointing: true
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
