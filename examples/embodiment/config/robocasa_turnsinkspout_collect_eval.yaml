defaults:
  - env/robocasa_closedrawer@env.train
  - env/robocasa_closedrawer@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robocasa_turnsinkspout_collect"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: True   # pure-inference eval rollout collection (step0 policy, no actor train -> no OOM)
  val_check_interval: -1
  save_interval: 20

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1   # v17/v19: 1 long epoch, auto_reset + continuous collect
  eval_rollout_epoch: 60   # ensure 100/rank reachable (collection stops at max_episodes)
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 1
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 1.0   # match train-rollout sampling (the "training" run that reportedly got ~56% SR)
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 64
    task_names: ["TurnSinkSpout"]
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 3840  # 480 x 8
    group_size: ${algorithm.group_size}
    reward_coef: ${algorithm.reward_coef}
    state_space: 16d          # match pi05 SFT ckpt (16-dim state), not the 25d default
    image_space: 3views       # match base collection (3 cameras: agentview_left/right + eye_in_hand)
    init_params:
      camera_heights: 128     # model input resolution used during base collection
      camera_widths: 128
    domain_rand:               # align scene dist with pi0.5 SFT/probe collection demos
      style_ids: [0,1,2,3,4,5,6,7,8,11]
      obj_instance_split: "A"
      generative_textures: "100p"
      randomize_cameras: true
    auto_reset: True          # done envs reset and keep collecting more episodes
    collect_rollout:
      enabled: false           # train-mode collect OFF; collection happens in eval (see env.eval.collect_rollout)
      save_dir: "checkpoints/probe_robocasa/rollout_collect_turnsinkspout"
      max_episodes: 100        # per rank; 4 ranks -> ~400 total, plenty
      n_action_dims: 7
    v17_continuous_collect:
      enabled: false
      target_trajectories: 64  # per-rank; collect this many then switch to dummy
    probe_cfg:
      enabled: false
      checkpoint_path: "checkpoints/probe_robocasa/probe2feat_turnoffstove_seed1_absts.pt"
      warmup_steps: 2          # no cutting during first 2 PPO steps
      K: 3
      agg: "median"
      initial_tau: 0.5         # TODO: recalibrate on success rollouts (alpha=0.15)
      alpha: 0.15
      exec_horizon: 20         # RMS/overlap window — must match probe training
      n_action_dims: 7         # first 7 action dims (arm 6dof+gripper, normalized)
      ts_mode: abs             # online-friendly: ts = chunk_step / ts_scale (handoff §9)
      ts_scale: 100.0          # t/100, matches abs-ts ckpt training
      min_cut_chunk: 2
      lang_encoder:
        enabled: true
        # encode the real ep_meta.lang at runtime with Qwen3 (matches policy input)
        model_path: "/path/to/model/Qwen3-Embedding-0.6B"
      online_update:
        enabled: true            # retrain probe each PPO step (policy drift adaptation)
        interval: 1
        buffer_size: 400
        recent_steps: 3
        freeze_after_step: 0
        epochs: 50
        min_episodes: 50
        lr: 1.0e-3
        batch_size: 64
        tau_margin: 0.02
        max_base_episodes: 500   # subsample base (stratified S/F) for faster retrain
        base_data_path: "checkpoints/probe_robocasa/robocasa_base_alltasks.pkl"
    video_cfg:
      save_video: False
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    total_num_envs: 8     # must be divisible by #env processes (4 GPUs here); 8/4=2
    task_names: ["TurnSinkSpout"]
    auto_reset: True
    ignore_terminations: False   # collection: record real success terminations (else SR=0, all fixed-length)
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    use_fixed_reset_state_ids: False    # random reset states (the ~56% SR distribution; fixed/ordered gave 0%)
    use_ordered_reset_state_ids: False
    is_eval: True
    collect_rollout:           # eval rollout-data collection (the one switch)
      enabled: true
      save_dir: "checkpoints/probe_robocasa/rollout_collect_turnsinkspout_eval"
      max_episodes: 100        # per rank; 4 ranks -> ~400 total
      n_action_dims: 7
    state_space: 16d          # match pi05 SFT ckpt (16-dim state)
    image_space: 3views
    init_params:
      camera_heights: 128
      camera_widths: 128
    domain_rand:               # align scene dist with pi0.5 SFT/probe collection demos
      style_ids: [0,1,2,3,4,5,6,7,8,11]
      obj_instance_split: "A"
      generative_textures: "100p"
      randomize_cameras: true
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: robocasa
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/RLinf-Pi05-RoboCasa"   # converted pytorch ckpt (see PLAN_pi05_robocasa_rl.md §5.1)
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/RLinf-Pi05-RoboCasa"
    model_type: "openpi"
    num_action_chunks: 20     # v19: match probe exec_horizon=20 (1 chunk_step = 1 probe step)
    num_steps: 5
    action_dim: 12
    add_value_head: True
    openpi:
      config_name: "pi05_robocasa"
      num_images_in_input: 3
      value_after_vlm: True
      detach_critic_input: True
      joint_logprob: False

    openpi_data:
      action_space: ${env.train.action_space}
      state_space: ${env.train.state_space}
      image_space: ${env.train.image_space}

    policy_setup: ${env.train.action_space}
  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    clip_grad: 1.0
    weight_decay: 0.01
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
